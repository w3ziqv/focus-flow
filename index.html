let state = {
  mode: 'focus', running: false, timeLeft: defaults.focus * 60, total: defaults.focus * 60,
  round: 0, settings: { ...defaults }, tips: loadTips(), stats: loadStats(),
  timer: null, focusOpen: false, task: '', sound: 'none', soundCtx: null, soundNode: null,
}

function loadTips() {
  try { const s = localStorage.getItem('ff_tips'); if (s) return JSON.parse(s) } catch {}
  return JSON.parse(JSON.stringify(defaultTips))
}
function saveTips() { localStorage.setItem('ff_tips', JSON.stringify(state.tips)) }

function loadStats() {
  try {
    const s = localStorage.getItem('ff_stats')
    if (s) {
      const d = JSON.parse(s); const today = new Date().toDateString()
      if (d.date !== today) {
        d.today = 0; d.date = today
        const ws = getWeekStart()
        if (d.weekStart !== ws) { d.week = 0; d.weekStart = ws }
      }
      return d
    }
  } catch {}
  return { today:0, week:0, streak:0, minutes:0, date:new Date().toDateString(), weekStart:getWeekStart(), lastDate:null, history:{} }
}
function getWeekStart() {
  const d = new Date(); const day = d.getDay()
  const diff = d.getDate() - day + (day===0?-6:1)
  return new Date(d.setDate(diff)).toDateString()
}
function saveStats() { localStorage.setItem('ff_stats', JSON.stringify(state.stats)) }

function loadSettings() {
  try {
    const s = localStorage.getItem('ff_settings')
    if (s) { state.settings = { ...defaults, ...JSON.parse(s) }; return }
  } catch {}
  state.settings = { ...defaults }
}
function saveSettings() { localStorage.setItem('ff_settings', JSON.stringify(state.settings)) }

function loadTheme() {
  const t = localStorage.getItem('ff_theme')
  if (t === 'dark' || t === 'light') { document.documentElement.setAttribute('data-theme', t); return t }
  // Respect system pref
  const sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
  document.documentElement.setAttribute('data-theme', sys)
  return sys
}

const $ = id => document.getElementById(id)
const timerDisplay = $('timerDisplay'), timerRound = $('timerRound')
const timerStart = $('timerStart'), timerResetBtn = $('timerReset')
const timerTip = $('timerTip'), timerTipIcon = $('timerTipIcon'), timerTipText = $('timerTipText'), timerTipSource = $('timerTipSource')
const focusBtn = $('focusBtn'), focusOverlay = $('focusOverlay')
const focusTimerDisplay = $('focusTimerDisplay'), focusTimerRound = $('focusTimerRound')
const focusStart = $('focusStart'), focusResetBtn = $('focusReset')
const focusTip = $('focusTip'), focusTipIcon = $('focusTipIcon'), focusTipText = $('focusTipText'), focusTipSource = $('focusTipSource'), focusExit = $('focusExit')
const settingsModal = $('settingsModal'), settingsClose = $('settingsClose')
const settingsFocus = $('settingsFocus'), settingsShort = $('settingsShort'), settingsLong = $('settingsLong'), settingsRounds = $('settingsRounds'), settingsAutoStart = $('settingsAutoStart'), settingsSave = $('settingsSave')
const statToday = $('statToday'), statWeek = $('statWeek'), statStreak = $('statStreak'), statMinutes = $('statMinutes')
const tipsContainer = $('tipsContainer')
const sidebarOverlay = $('sidebarOverlay'), hamburger = $('hamburger'), sidebarClose = $('sidebarClose'), themeBtn = $('themeBtn'), sidebarLang = $('sidebarLang')
const taskInput = $('taskInput'), taskWrap = $('taskWrap'), taskDone = $('taskDone'), taskDoneText = $('taskDoneText')
const chart = $('chart'), chartLabels = $('chartLabels')

function formatTime(sec) { return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}` }
function updateDisplay(display, roundEl) {
  display.textContent = formatTime(state.timeLeft)
  roundEl.textContent = dict[lang.current]['round-count'].replace('0',state.round).replace('4',state.settings.rounds)
}
function getTipText(tip) { return (tip && tip[lang.current]) ? tip[lang.current].title : tip }

function startTimer() {
  if (state.running) return
  // Save task
  const val = taskInput.value.trim()
  if (val) { state.task = val; taskInput.value = val; taskInput.style.display = 'none'; taskDone.style.display = 'none' }
  state.running = true
  timerStart.textContent = dict[lang.current]['timer-running']
  focusStart.textContent = dict[lang.current]['timer-running']
  state.timer = setInterval(() => {
    state.timeLeft--
    if (state.timeLeft <= 0) { clearInterval(state.timer); state.running = false; onSessionComplete(); return }
    updateDisplay(timerDisplay, timerRound)
    if (state.focusOpen) updateDisplay(focusTimerDisplay, focusTimerRound)
  }, 1000)
}

function pauseTimer() {
  if (!state.running) return
  clearInterval(state.timer); state.timer = null; state.running = false
  timerStart.textContent = dict[lang.current]['timer-start']
  focusStart.textContent = dict[lang.current]['timer-start']
}

function resetTimer() {
  clearInterval(state.timer); state.timer = null; state.running = false
  timerStart.textContent = dict[lang.current]['timer-start']
  focusStart.textContent = dict[lang.current]['timer-start']
  const mins = state.settings[state.mode]
  state.timeLeft = mins * 60; state.total = mins * 60
  updateDisplay(timerDisplay, timerRound)
  if (state.focusOpen) updateDisplay(focusTimerDisplay, focusTimerRound)
  // Show task input again
  taskInput.style.display = ''
  if (state.task) { taskInput.value = state.task; taskDone.style.display = ''; taskDoneText.textContent = state.task }
  else taskDone.style.display = 'none'
}

function onSessionComplete() {
  beep()
  if ('Notification' in window && Notification.permission === 'granted') {
    try { new Notification(dict[lang.current]['session-complete']) } catch {}
  }
  state.stats.today++; state.stats.week++; state.stats.minutes += state.settings.focus
  const today = new Date().toDateString()
  if (state.stats.lastDate) {
    const diff = (new Date(today) - new Date(state.stats.lastDate)) / 86400000
    if (diff === 1) state.stats.streak++
    else if (diff > 1) state.stats.streak = 1
  } else state.stats.streak = 1
  state.stats.lastDate = today; state.stats.date = today; state.stats.weekStart = getWeekStart()
  // Save history for chart
  if (!state.stats.history) state.stats.history = {}
  state.stats.history[today] = (state.stats.history[today] || 0) + state.settings.focus
  saveStats(); updateStats(); renderChart()

  // Mark task done
  if (state.task) {
    taskDone.style.display = ''; taskDoneText.textContent = state.task
    taskInput.style.display = 'none'
  }

  state.round++
  const auto = state.settings.autoStart
  if (state.mode === 'focus') {
    if (state.round >= state.settings.rounds) { state.round = 0; switchMode('long', auto) }
    else switchMode('short', auto)
  } else switchMode('focus', auto)
  if (state.mode !== 'focus') showBreakTip()
}

function showBreakTip() {
  const allTips = [...state.tips.przerwa, ...state.tips.jedzenie]
  const tip = allTips[Math.floor(Math.random() * allTips.length)]
  timerTip.classList.add('visible')
  timerTipIcon.textContent = state.mode === 'short' ? '☕' : '🌿'
  timerTipText.textContent = getTipText(tip)
  timerTipSource.textContent = `— ${dict[lang.current][state.mode === 'short' ? 'mode-short' : 'mode-long']}`
  setTimeout(() => timerTip.classList.remove('visible'), 8000)
}

function switchMode(mode, autoStart) {
  state.mode = mode
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode)
    t.setAttribute('aria-selected', t.dataset.mode === mode)
  })
  const mins = state.settings[mode === 'focus' ? 'focus' : mode === 'short' ? 'short' : 'long']
  state.timeLeft = mins * 60; state.total = mins * 60
  state.running = false; clearInterval(state.timer); state.timer = null
  timerStart.textContent = dict[lang.current]['timer-start']
  focusStart.textContent = dict[lang.current]['timer-start']
  updateDisplay(timerDisplay, timerRound)
  if (state.focusOpen) updateDisplay(focusTimerDisplay, focusTimerRound)
  if (mode === 'focus') { timerTip.classList.remove('visible'); focusTip.classList.remove('visible') }
  if (autoStart && mode !== 'focus') startTimer()
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)()
    const osc = ctx.createOscillator(); const gain = ctx.createGain()
    osc.connect(gain); gain.connect(ctx.destination)
    osc.frequency.value = 880; osc.type = 'sine'; gain.gain.value = 0.3
    osc.start(); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4)
    osc.stop(ctx.currentTime + 0.4)
  } catch {}
}

// Ambient sound
function stopSound() {
  if (state.soundNodes) { state.soundNodes.forEach(n => { try { n.stop() } catch {} }); state.soundNodes = null }
  if (state.soundCtx) { try { state.soundCtx.close() } catch {}; state.soundCtx = null }
}
function createNoiseBuffer(ctx) {
  const len = ctx.sampleRate * 2
  const buf = ctx.createBuffer(1, len, ctx.sampleRate)
  const d = buf.getChannelData(0)
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1
  return buf
}
function makeSource(ctx, buf) {
  const s = ctx.createBufferSource()
  s.buffer = buf; s.loop = true; s.start()
  return s
}
function playRain(ctx) {
  const buf = createNoiseBuffer(ctx)
  const nodes = []

  // Layer 1: low rumble (distant rain body)
  const s1 = makeSource(ctx, buf)
  const lp1 = ctx.createBiquadFilter(); lp1.type = 'lowpass'; lp1.frequency.value = 600
  const g1 = ctx.createGain(); g1.gain.value = 0.08
  s1.connect(lp1); lp1.connect(g1); g1.connect(ctx.destination)
  nodes.push(s1)

  // Layer 2: mid hiss (close rain)
  const buf2 = createNoiseBuffer(ctx)
  const s2 = makeSource(ctx, buf2)
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2200; bp.Q.value = 0.8
  const g2 = ctx.createGain(); g2.gain.value = 0.06
  s2.connect(bp); bp.connect(g2); g2.connect(ctx.destination)
  nodes.push(s2)

  // Layer 3: high shimmer (droplets)
  const buf3 = createNoiseBuffer(ctx)
  const s3 = makeSource(ctx, buf3)
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 5000
  const g3 = ctx.createGain(); g3.gain.value = 0.03
  s3.connect(hp); hp.connect(g3); g3.connect(ctx.destination)
  nodes.push(s3)

  // Slow LFO for natural modulation
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.15; lfo.type = 'sine'
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.015
  lfo.connect(lfoGain); lfoGain.connect(g2.gain)
  // Also slightly modulate the high layer
  const lfoG2 = ctx.createGain(); lfoG2.gain.value = 0.01
  lfo.connect(lfoG2); lfoG2.connect(g3.gain)
  lfo.start()
  nodes.push(lfo)

  return nodes
}
function playNoise(ctx) {
  const buf = createNoiseBuffer(ctx)
  const nodes = []

  // Pink-ish noise: white noise rolled off at highs for a warm ambient sound
  const s = makeSource(ctx, buf)
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 6000
  const g = ctx.createGain(); g.gain.value = 0.035
  s.connect(lp); lp.connect(g); g.connect(ctx.destination)
  nodes.push(s)

  return nodes
}
function setSound(s) {
  stopSound()
  state.sound = s
  document.querySelectorAll('.sound-btn').forEach(b => b.classList.toggle('active', b.dataset.sound === s))
  if (s === 'none') return
  try {
    state.soundCtx = new (window.AudioContext || window.webkitAudioContext)()
    state.soundNodes = []
    if (s === 'rain') state.soundNodes = playRain(state.soundCtx)
    else if (s === 'noise') state.soundNodes = playNoise(state.soundCtx)
  } catch {}
}

function updateStats() {
  statToday.textContent = state.stats.today
  statWeek.textContent = state.stats.week
  statStreak.textContent = state.stats.streak || dict[lang.current]['stat-streak-none']
  statMinutes.textContent = state.stats.minutes
}

function renderChart() {
  const days = []
  const today = new Date()
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today)
    d.setDate(d.getDate() - i)
    const key = d.toDateString()
    const min = (state.stats.history && state.stats.history[key]) || 0
    days.push({ label: d.toLocaleDateString(lang.current === 'pl' ? 'pl' : 'en', { weekday:'short' }), val: min })
  }
  const max = Math.max(...days.map(d => d.val), 1)
  chart.innerHTML = days.map(d => `<div class="chart-bar ${d.val > 0 ? 'fill' : ''}" style="height:${Math.max(2, (d.val/max)*56)}px"></div>`).join('')
  chartLabels.innerHTML = days.map(d => `<span>${d.label}</span>`).join('')
}

function renderTips() {
  tipsContainer.innerHTML = ''
  const cats = ['nauka','przerwa','sen','jedzenie','produktywnosc']
  cats.forEach(cat => {
    const sec = document.createElement('div'); sec.className = 'tips-category'
    const hdr = document.createElement('button'); hdr.className = 'tips-category-header'; hdr.setAttribute('aria-expanded','false')
    hdr.innerHTML = `<h2>${dict[lang.current]['tip-category-'+cat]}</h2><span class="toggle-icon">+</span>`
    sec.appendChild(hdr)
    const body = document.createElement('div'); body.className = 'tips-category-body'; body.style.display = 'none'
    state.tips[cat].forEach(tip => {
      const t = tip[lang.current]
      const item = document.createElement('div'); item.className = 'tip-item'
      item.innerHTML = `<div class="tip-item-body"><strong>${t.title}</strong><span>${t.desc}</span></div>`
      body.appendChild(item)
    })
    sec.appendChild(body); tipsContainer.appendChild(sec)
    hdr.addEventListener('click', () => {
      const exp = hdr.getAttribute('aria-expanded') === 'true'
      hdr.setAttribute('aria-expanded', !exp); body.style.display = exp ? 'none' : 'block'
      hdr.querySelector('.toggle-icon').textContent = exp ? '+' : '−'
    })
  })
}

function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
  const t = document.getElementById('view-'+view); if (t) t.classList.add('active')
  document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active', l.dataset.view === view))
  closeSidebar()
}
function openSidebar() { sidebarOverlay.classList.add('open') }
function closeSidebar() { sidebarOverlay.classList.remove('open') }

function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t)
  localStorage.setItem('ff_theme', t)
  themeBtn.textContent = dict[lang.current][t === 'dark' ? 'theme-dark' : 'theme-light']
  // Update meta theme-color
  document.querySelector('meta[name="theme-color"]').setAttribute('content', t === 'dark' ? '#0a0a0a' : '#ffffff')
}

function apply(l) {
  lang.current = l; document.documentElement.lang = l; localStorage.setItem('ff_lang', l)
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n; if (dict[l][k]) el.textContent = dict[l][k]
  })
  document.querySelectorAll('[data-i18n-aria]').forEach(el => {
    const k = el.dataset.i18nAria; if (dict[l][k]) el.setAttribute('aria-label', dict[l][k])
  })
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const k = el.dataset.i18nPlaceholder; if (dict[l][k]) el.setAttribute('placeholder', dict[l][k])
  })
  updateDisplay(timerDisplay, timerRound)
  if (state.focusOpen) updateDisplay(focusTimerDisplay, focusTimerRound)
  if (state.running) { timerStart.textContent = dict[l]['timer-running']; focusStart.textContent = dict[l]['timer-running'] }
  const curTheme = document.documentElement.getAttribute('data-theme') || 'light'
  themeBtn.textContent = dict[l][curTheme === 'dark' ? 'theme-dark' : 'theme-light']
  renderTips(); updateStats(); renderChart()
}

// Init
const savedTheme = loadTheme()
loadSettings()
state.mode = 'focus'
state.timeLeft = state.settings.focus * 60
state.total = state.settings.focus * 60
updateDisplay(timerDisplay, timerRound)
updateStats()
renderTips()
renderChart()
apply(lang.current)
setTheme(savedTheme)

if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission()

// Event listeners
hamburger.addEventListener('click', openSidebar)
sidebarClose.addEventListener('click', closeSidebar)
sidebarOverlay.addEventListener('click', e => { if (e.target === sidebarOverlay) closeSidebar() })

document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', () => switchView(link.dataset.view))
  link.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); switchView(link.dataset.view) } })
})

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => { if (state.running) pauseTimer(); switchMode(tab.dataset.mode) })
})

timerStart.addEventListener('click', () => state.running ? pauseTimer() : startTimer())
timerResetBtn.addEventListener('click', resetTimer)

// Task input: show done state when blurred with value
taskInput.addEventListener('change', () => {
  if (taskInput.value.trim()) { state.task = taskInput.value.trim() }
})

$('timerSettings').addEventListener('click', () => {
  settingsFocus.value = state.settings.focus
  settingsShort.value = state.settings.short
  settingsLong.value = state.settings.long
  settingsRounds.value = state.settings.rounds
  settingsAutoStart.checked = state.settings.autoStart
  settingsModal.classList.add('open')
})
settingsClose.addEventListener('click', () => settingsModal.classList.remove('open'))
settingsModal.addEventListener('click', e => { if (e.target === settingsModal) settingsModal.classList.remove('open') })
settingsSave.addEventListener('click', () => {
  state.settings.focus = parseInt(settingsFocus.value) || defaults.focus
  state.settings.short = parseInt(settingsShort.value) || defaults.short
  state.settings.long = parseInt(settingsLong.value) || defaults.long
  state.settings.rounds = parseInt(settingsRounds.value) || defaults.rounds
  state.settings.autoStart = settingsAutoStart.checked
  saveSettings()
  settingsModal.classList.remove('open')
  resetTimer()
  updateDisplay(timerDisplay, timerRound)
  if (state.focusOpen) updateDisplay(focusTimerDisplay, focusTimerRound)
})

// Sound buttons
document.querySelectorAll('.sound-btn').forEach(b => {
  b.addEventListener('click', () => setSound(b.dataset.sound))
})

focusBtn.addEventListener('click', () => {
  state.focusOpen = true; focusOverlay.classList.add('open')
  updateDisplay(focusTimerDisplay, focusTimerRound)
  if (state.running) focusStart.textContent = dict[lang.current]['timer-running']
  if (timerTip.classList.contains('visible')) {
    focusTip.classList.add('visible'); focusTipIcon.textContent = timerTipIcon.textContent
    focusTipText.textContent = timerTipText.textContent; focusTipSource.textContent = timerTipSource.textContent
  }
})
focusExit.addEventListener('click', () => { state.focusOpen = false; focusOverlay.classList.remove('open') })
focusStart.addEventListener('click', () => state.running ? pauseTimer() : startTimer())
focusResetBtn.addEventListener('click', resetTimer)

// Theme toggle
themeBtn.addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme')
  setTheme(cur === 'dark' ? 'light' : 'dark')
})

// Sidebar lang
sidebarLang.addEventListener('click', () => apply(lang.current === 'pl' ? 'en' : 'pl'))

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return
  if (e.key === ' ') { e.preventDefault(); state.running ? pauseTimer() : startTimer() }
  if (e.key === 'r' || e.key === 'R') resetTimer()
  if ((e.key === 'f' || e.key === 'F') && !state.focusOpen) focusBtn.click()
  if (e.key === 'Escape') {
    if (state.focusOpen) focusExit.click()
    else if (settingsModal.classList.contains('open')) settingsModal.classList.remove('open')
    else if (sidebarOverlay.classList.contains('open')) closeSidebar()
  }
})
</script>
</body>
